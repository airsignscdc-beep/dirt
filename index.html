<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土方快速查詢 - 自訂排序版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .upload-section { border: 2px dashed #3498db; padding: 15px; text-align: center; margin-bottom: 20px; border-radius: 8px; background: #eef7ff; }
        .search-box { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; outline: none; }
        .search-box:focus { border-color: #3498db; }
        
        /* 多筆結果選擇區 */
        .select-list { margin-top: 10px; display: none; }
        .select-item { background: #fff; border: 1px solid #3498db; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .select-item:active { background: #eef7ff; }
        .select-item b { color: #d93025; }

        .result-card { border: 1px solid #e0e0e0; padding: 15px; margin-top: 20px; border-radius: 10px; display: none; background: #fafafa; position: relative; }
        
        /* 排序功能相關樣式 */
        .edit-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .btn-edit { font-size: 12px; padding: 6px 12px; border: 1px solid #3498db; border-radius: 4px; background: white; color: #3498db; cursor: pointer; }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; background: #fafafa; transition: background 0.3s; }
        .copy-btn { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .status-bar { font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; }
        .btn-clear { font-size: 11px; color: #999; border: none; background: none; text-decoration: underline; cursor: pointer; }

        /* 調整模式啟動時的樣式 */
        .editing .data-row { background: #fffde7; border: 1px dashed #f39c12; cursor: grab; padding: 10px; border-radius: 5px; }
        .editing .data-row:active { cursor: grabbing; }
        .editing .copy-btn { pointer-events: none; opacity: 0.5; } /* 調整時停用複製按鈕防誤觸 */
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-top:0;">🚚 土方資料查詢</h2>
    <div id="status-text" class="status-bar">尚未匯入資料</div>

    <div class="upload-section" id="upload-ui">
        <input type="file" id="excel-file" accept=".xlsx, .xls">
    </div>

    <div id="search-ui" style="display:none;">
        <input type="text" id="search-input" class="search-box" placeholder="輸入車號數字即可...">
        <div id="select-list" class="select-list"></div>
        <div style="text-align: right;"><button class="btn-clear" onclick="clearData()">清除/更新資料</button></div>
    </div>

    <div id="result-card" class="result-card">
        <div class="edit-bar">
            <button class="btn-edit" id="btn-edit" onclick="toggleEditMode()">🛠 開啟調整順序</button>
        </div>
        
        <div id="sortable-list">
            <div class="data-row" data-id="row-name">
                <span>姓名：<b id="res-name"></b></span>
                <button class="copy-btn" onclick="copyText('res-name')">複製</button>
            </div>
            <div class="data-row" data-id="row-id">
                <span>身分證：<b id="res-id"></b></span>
                <button class="copy-btn" onclick="copyText('res-id')">複製</button>
            </div>
            <div class="data-row" data-id="row-head">
                <span>車頭：<b id="res-head"></b></span>
                <button class="copy-btn" onclick="copyText('res-head')">複製</button>
            </div>
            <div class="data-row" data-id="row-tail">
                <span>車斗：<b id="res-tail"></b></span>
                <button class="copy-btn" onclick="copyText('res-tail')">複製</button>
            </div>
        </div>
    </div>
</div>

<script>
    let driverData = [];
    let sortableInstance = null;

    window.onload = function() {
        const savedData = localStorage.getItem('truck_data');
        if (savedData) {
            driverData = JSON.parse(savedData);
            showSearchUI();
        }
        initSortable();
    };

    function showSearchUI() {
        document.getElementById('upload-ui').style.display = 'none';
        document.getElementById('search-ui').style.display = 'block';
        document.getElementById('status-text').innerText = `✅ 資料庫：${driverData.length} 筆`;
    }

    function clearData() {
        if(confirm("確定要更換資料庫嗎？")) { localStorage.removeItem('truck_data'); location.reload(); }
    }

    // 初始化排序功能
    function initSortable() {
        const el = document.getElementById('sortable-list');
        sortableInstance = Sortable.create(el, {
            disabled: true, // 預設關閉防誤觸
            animation: 150,
            onEnd: function () {
                // 拖曳結束後儲存順序
                const order = sortableInstance.toArray();
                localStorage.setItem('field_order', JSON.stringify(order));
            }
        });

        // 載入之前儲存的順序
        const savedOrder = localStorage.getItem('field_order');
        if (savedOrder) {
            sortableInstance.sort(JSON.parse(savedOrder));
        }
    }

    // 切換調整模式
    function toggleEditMode() {
        const el = document.getElementById('sortable-list');
        const btn = document.getElementById('btn-edit');
        const isDisabled = sortableInstance.options.disabled;

        if (isDisabled) {
            // 開啟調整
            sortableInstance.option('disabled', false);
            el.classList.add('editing');
            btn.innerText = "✅ 完成並儲存";
            btn.style.background = "#3498db";
            btn.style.color = "white";
        } else {
            // 關閉調整
            sortableInstance.option('disabled', true);
            el.classList.remove('editing');
            btn.innerText = "🛠 開啟調整順序";
            btn.style.background = "white";
            btn.style.color = "#3498db";
        }
    }

    document.getElementById('excel-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            if (json.length > 0) {
                driverData = json.map(row => {
                    let clean = {};
                    for (let k in row) { clean[k.replace(/[\|\s]/g, "")] = String(row[k]).trim(); }
                    return clean;
                });
                localStorage.setItem('truck_data', JSON.stringify(driverData));
                showSearchUI();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    document.getElementById('search-input').addEventListener('input', function() {
        const val = this.value.toUpperCase().trim();
        const listUI = document.getElementById('select-list');
        const card = document.getElementById('result-card');
        
        listUI.innerHTML = "";
        card.style.display = 'none';

        if (val.length < 2) return;

        // 找出所有符合的資料
        const matches = driverData.filter(d => 
            (String(d["車頭車號"] || "").toUpperCase().includes(val)) || 
            (String(d["車斗車號"] || "").toUpperCase().includes(val))
        );

        if (matches.length === 1) {
            displayResult(matches[0]);
        } else if (matches.length > 1) {
            listUI.style.display = 'block';
            matches.forEach((d, index) => {
                const item = document.createElement('div');
                item.className = 'select-item';
                item.innerHTML = `<div><b>${d["車頭車號"]}</b> (${d["姓名"]})</div> <span>選取 ></span>`;
                item.onclick = () => {
                    displayResult(d);
                    listUI.style.display = 'none';
                };
                listUI.appendChild(item);
            });
        }
    });

    function displayResult(data) {
        document.getElementById('res-name').innerText = data["姓名"] || "無";
        document.getElementById('res-id').innerText = data["身分證"] || "無";
        document.getElementById('res-head').innerText = data["車頭車號"] || "無";
        document.getElementById('res-tail').innerText = data["車斗車號"] || "無";
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('select-list').style.display = 'none';
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        const btn = event.target;
        const old = btn.innerText;
        btn.innerText = "OK";
        setTimeout(() => btn.innerText = old, 800);
    }
</script>
</body>
</html>
